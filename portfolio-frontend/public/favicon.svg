<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#0B0E14" />

  <defs>
    <linearGradient id="legGrad" x1="14" y1="48" x2="50" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4FD1C5" />
      <stop offset="100%" stop-color="#FFB454" />
    </linearGradient>
  </defs>

  <!-- Monogram "A" as two clean signal-line legs -->
  <path
    d="M32 14 L15 49"
    stroke="#4FD1C5"
    stroke-width="6"
    stroke-linecap="round"
  />
  <path
    d="M32 14 L49 49"
    stroke="#FFB454"
    stroke-width="6"
    stroke-linecap="round"
  />
  <path
    d="M22.5 37 L41.5 37"
    stroke="url(#legGrad)"
    stroke-width="5.5"
    stroke-linecap="round"
  />

  <!-- Apex node: the "signal becomes cognition" point -->
  <circle cx="32" cy="14" r="5.5" fill="#0B0E14" stroke="#4FD1C5" stroke-width="2.5" />
  <circle cx="32" cy="14" r="2" fill="#FFC97A" />
</svg>
